family:
  sons: []
  husband: {}

email:
  check_times: ["07:00", "20:00"]
  timezone: "America/Los_Angeles"

reminders:
  default_snooze: 1h
  quiet_hours: ["22:00", "07:00"]
  pre_alerts:
    - offset: 1d_before
      time: "20:00"
      message_prefix: "Tomorrow"
    - offset: morning_of
      time: "08:00"
      message_prefix: "Today"

notes:
  auto_suggest_reminder: true
